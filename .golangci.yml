run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - revive
    - gocritic
    - gosec
    - prealloc
  disable:
    - exhaustive
    - wrapcheck

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: true
      - name: unexported-return
        disabled: false
      - name: blank-imports
        disabled: false
      - name: context-as-argument
        disabled: false
      - name: error-return
        disabled: false
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam
      - rangeValCopy
  misspell:
    locale: US

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-dirs:
    - testdata
